name: OpenSNES Build & Release

# ------------------------------------ #
# Events to trigger the action         #
# ------------------------------------ #
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "develop"
    tags-ignore:
      - "v*"  # Release tags are handled by release.yml
  pull_request:
    branches:
      - "main"
      - "develop"

# ------------------------------------ #
# Set O.S matrix                       #
# ------------------------------------ #
jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            arch: x86_64
          - os: windows-latest
            name: windows
            arch: x86_64
          - os: macos-latest
            name: darwin
            arch: arm64

    steps:
      # ------------------------------------ #
      # Install dependencies                 #
      # ------------------------------------ #
      - name: Install dependencies for Linux
        if: matrix.name == 'linux'
        run: |
          sudo apt update -y
          sudo apt-get install -y build-essential \
              clang \
              cmake \
              make \
              git \
              doxygen \
              zip

      - name: Install dependencies for Windows
        if: matrix.name == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-doxygen
            mingw-w64-ucrt-x86_64-python
            base-devel
            git
            zip

      - name: Install dependencies for macOS
        if: matrix.name == 'darwin'
        run: |
          brew update || true
          brew install doxygen zip || true
          # Xcode Command Line Tools provides the compiler

      # ------------------------------------ #
      # Checkout the project                 #
      # ------------------------------------ #
      - name: Check out OpenSNES
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------ #
      # Build & create release               #
      # ------------------------------------ #
      - name: Build & Release OpenSNES for Linux
        if: matrix.name == 'linux'
        run: |
          export OPENSNES_HOME=$(pwd)
          make release 2>&1 | tee opensnes_release_${{ matrix.name }}.log

      - name: Build & Release OpenSNES for Windows
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          export OPENSNES_HOME=$(pwd)
          # cproc non-deterministically segfaults on MSYS2; retry make up to 3 times
          for attempt in 1 2 3; do
            if make release 2>&1 | tee opensnes_release_${{ matrix.name }}.log; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Build failed after 3 attempts"
              exit 1
            fi
            echo "=== Build attempt $attempt failed (likely cproc segfault), retrying... ==="
            make clean
          done

      - name: Build & Release OpenSNES for macOS
        if: matrix.name == 'darwin'
        run: |
          export OPENSNES_HOME=$(pwd)
          make release 2>&1 | tee opensnes_release_${{ matrix.name }}.log

      # ------------------------------------ #
      # Tests (moved to opensnes-emu)        #
      # ------------------------------------ #
      # Unit tests, compiler tests, and example validation are now handled by
      # tools/opensnes-emu/test/run-all-tests.mjs (requires Node.js + WASM).
      # CI runs build + symmap validation only. Full test suite runs locally.

      # ------------------------------------ #
      # Build and validate examples          #
      # ------------------------------------ #
      - name: Build examples (Linux/macOS)
        if: matrix.name != 'windows'
        run: |
          set -o pipefail
          echo "=== Building Examples ===" | tee -a opensnes_release_${{ matrix.name }}.log
          make examples 2>&1 | tee -a opensnes_release_${{ matrix.name }}.log

      - name: Build examples (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          echo "=== Building Examples ===" | tee -a opensnes_release_${{ matrix.name }}.log
          make examples 2>&1 | tee -a opensnes_release_${{ matrix.name }}.log

      # Validate examples: symmap overlap check on built .sym files
      - name: Validate examples (Linux/macOS)
        if: matrix.name != 'windows'
        run: |
          echo "=== Validating Examples ===" | tee -a opensnes_release_${{ matrix.name }}.log
          found=0
          for sym in $(find examples -name "*.sym" 2>/dev/null); do
            python3 devtools/symmap/symmap.py --check-overlap "$sym" 2>&1 | tee -a opensnes_release_${{ matrix.name }}.log
            found=1
          done
          [ "$found" = "0" ] && echo "No .sym files found (examples not built in CI)" | tee -a opensnes_release_${{ matrix.name }}.log
          true

      - name: Validate examples (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          echo "=== Validating Examples ===" | tee -a opensnes_release_${{ matrix.name }}.log
          found=0
          for sym in $(find examples -name "*.sym" 2>/dev/null); do
            python3 devtools/symmap/symmap.py --check-overlap "$sym" 2>&1 | tee -a opensnes_release_${{ matrix.name }}.log
            found=1
          done
          [ "$found" = "0" ] && echo "No .sym files found (examples not built in CI)" | tee -a opensnes_release_${{ matrix.name }}.log
          true

      # ------------------------------------ #
      # Check library linking                #
      # ------------------------------------ #
      - name: Check library linking (macOS)
        if: matrix.name == 'darwin'
        run: |
          echo "=== Library Linking ===" | tee opensnes_linking_${{ matrix.name }}.log
          otool -L bin/* 2>/dev/null | tee -a opensnes_linking_${{ matrix.name }}.log || true

      - name: Check library linking (Linux)
        if: matrix.name == 'linux'
        run: |
          echo "=== Library Linking ===" | tee opensnes_linking_${{ matrix.name }}.log
          ldd bin/* 2>/dev/null | tee -a opensnes_linking_${{ matrix.name }}.log || true

      - name: Check library linking (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          echo "=== Library Linking ===" | tee opensnes_linking_${{ matrix.name }}.log
          ldd bin/*.exe 2>/dev/null | tee -a opensnes_linking_${{ matrix.name }}.log || true

      # ------------------------------------ #
      # Upload SDK release                   #
      # ------------------------------------ #
      - name: Upload OpenSNES SDK release
        uses: actions/upload-artifact@v4
        with:
          name: OpenSNES SDK (${{ matrix.name }}_${{ matrix.arch }})
          path: release/opensnes_${{ matrix.name }}_${{ matrix.arch }}.zip

      # ------------------------------------ #
      # Upload build logs                    #
      # ------------------------------------ #
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenSNES Logs (${{ matrix.name }})
          path: "*.log"

