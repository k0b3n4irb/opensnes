name: OpenSNES Build & Release

# ------------------------------------ #
# Events to trigger the action         #
# ------------------------------------ #
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "develop"
    tags-ignore:
      - "v*"  # Release tags are handled by release.yml
  pull_request:
    branches:
      - "main"
      - "develop"

# ------------------------------------ #
# Set O.S matrix                       #
# ------------------------------------ #
jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            arch: x86_64
          - os: windows-latest
            name: windows
            arch: x86_64
          - os: macos-latest
            name: darwin
            arch: arm64

    steps:
      # ------------------------------------ #
      # Install dependencies                 #
      # ------------------------------------ #
      - name: Install dependencies for Linux
        if: matrix.name == 'linux'
        run: |
          sudo apt update -y
          sudo apt-get install -y build-essential \
              clang \
              cmake \
              make \
              git \
              doxygen \
              zip

      - name: Install dependencies for Windows
        if: matrix.name == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-doxygen
            mingw-w64-ucrt-x86_64-python
            base-devel
            git
            zip

      - name: Install dependencies for macOS
        if: matrix.name == 'darwin'
        run: |
          brew update || true
          brew install doxygen zip || true
          # Xcode Command Line Tools provides the compiler

      # ------------------------------------ #
      # Checkout the project                 #
      # ------------------------------------ #
      - name: Check out OpenSNES
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------ #
      # Verify compiler toolchain pins        #
      # ------------------------------------ #
      # Drift between submodule pointer and compiler/PINS.md fails fast before
      # any build cost. Skipped on Windows because the MSYS2 shell wraps make
      # itself, but the Linux/macOS legs cover the same submodule SHAs.
      - name: Verify compiler toolchain pins
        if: matrix.name != 'windows'
        run: python3 devtools/verify_toolchain.py

      # ------------------------------------ #
      # Build & create release               #
      # ------------------------------------ #
      - name: Build & Release OpenSNES for Linux
        if: matrix.name == 'linux'
        run: |
          export OPENSNES_HOME=$(pwd)
          make release 2>&1 | tee opensnes_release_${{ matrix.name }}.log

      - name: Build & Release OpenSNES for Windows
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          export OPENSNES_HOME=$(pwd)
          # cproc non-deterministically segfaults on MSYS2; retry make up to 3 times
          for attempt in 1 2 3; do
            if make release 2>&1 | tee opensnes_release_${{ matrix.name }}.log; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Build failed after 3 attempts"
              exit 1
            fi
            echo "=== Build attempt $attempt failed (likely cproc segfault), retrying... ==="
            make clean
          done

      - name: Build & Release OpenSNES for macOS
        if: matrix.name == 'darwin'
        run: |
          export OPENSNES_HOME=$(pwd)
          make release 2>&1 | tee opensnes_release_${{ matrix.name }}.log

      # ------------------------------------ #
      # Functional tests run in a separate   #
      # job (see `functional-tests` below):  #
      # opensnes-emu is Linux-only (WASM     #
      # build via emsdk), so we don't try    #
      # to run it on Windows/macOS legs.     #
      # ------------------------------------ #

      # ------------------------------------ #
      # Build and validate examples          #
      # ------------------------------------ #
      - name: Build examples (Linux/macOS)
        if: matrix.name != 'windows'
        run: |
          set -o pipefail
          echo "=== Building Examples ===" | tee -a opensnes_release_${{ matrix.name }}.log
          make examples 2>&1 | tee -a opensnes_release_${{ matrix.name }}.log

      - name: Build examples (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          echo "=== Building Examples ===" | tee -a opensnes_release_${{ matrix.name }}.log
          make examples 2>&1 | tee -a opensnes_release_${{ matrix.name }}.log

      # Validate examples: symmap overlap check on built .sym files
      - name: Validate examples (Linux/macOS)
        if: matrix.name != 'windows'
        run: |
          echo "=== Validating Examples ===" | tee -a opensnes_release_${{ matrix.name }}.log
          found=0
          for sym in $(find examples -name "*.sym" 2>/dev/null); do
            python3 devtools/symmap/symmap.py --check-overlap "$sym" 2>&1 | tee -a opensnes_release_${{ matrix.name }}.log
            found=1
          done
          [ "$found" = "0" ] && echo "No .sym files found (examples not built in CI)" | tee -a opensnes_release_${{ matrix.name }}.log
          true

      - name: Validate examples (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          echo "=== Validating Examples ===" | tee -a opensnes_release_${{ matrix.name }}.log
          found=0
          for sym in $(find examples -name "*.sym" 2>/dev/null); do
            python3 devtools/symmap/symmap.py --check-overlap "$sym" 2>&1 | tee -a opensnes_release_${{ matrix.name }}.log
            found=1
          done
          [ "$found" = "0" ] && echo "No .sym files found (examples not built in CI)" | tee -a opensnes_release_${{ matrix.name }}.log
          true

      # ------------------------------------ #
      # Check library linking                #
      # ------------------------------------ #
      - name: Check library linking (macOS)
        if: matrix.name == 'darwin'
        run: |
          echo "=== Library Linking ===" | tee opensnes_linking_${{ matrix.name }}.log
          otool -L bin/* 2>/dev/null | tee -a opensnes_linking_${{ matrix.name }}.log || true

      - name: Check library linking (Linux)
        if: matrix.name == 'linux'
        run: |
          echo "=== Library Linking ===" | tee opensnes_linking_${{ matrix.name }}.log
          ldd bin/* 2>/dev/null | tee -a opensnes_linking_${{ matrix.name }}.log || true

      - name: Check library linking (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          echo "=== Library Linking ===" | tee opensnes_linking_${{ matrix.name }}.log
          ldd bin/*.exe 2>/dev/null | tee -a opensnes_linking_${{ matrix.name }}.log || true

      # ------------------------------------ #
      # Upload SDK release                   #
      # ------------------------------------ #
      - name: Upload OpenSNES SDK release
        uses: actions/upload-artifact@v4
        with:
          name: OpenSNES SDK (${{ matrix.name }}_${{ matrix.arch }})
          path: release/opensnes_${{ matrix.name }}_${{ matrix.arch }}.zip

      # ------------------------------------ #
      # Upload build logs                    #
      # ------------------------------------ #
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenSNES Logs (${{ matrix.name }})
          path: "*.log"

  # ====================================================================== #
  # Functional tests via opensnes-emu (snes9x WASM)                        #
  #                                                                        #
  # Runs the full test suite — visual regression, lag detection, runtime,  #
  # static analysis, input sequences. Linux-only because the WASM core     #
  # requires emsdk, and MSYS2 cproc segfaults make Windows test runs       #
  # unreliable. Failures here block PR merges.                             #
  # ====================================================================== #
  functional-tests:
    name: Functional Tests (opensnes-emu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          # xvfb provides a virtual X server so the Avalonia-based Mesen2
          # binary can run on this headless ubuntu-latest runner. Without
          # it Mesen2 SIGABRTs during GUI subsystem init, even with
          # --testrunner. The test/phases/visual-mesen2.mjs phase auto-
          # wraps Mesen2 in `xvfb-run -a` when $DISPLAY is missing.
          # libsdl2-2.0-0 is the runtime SDL2 library that Mesen2's native
          # core (MesenCore.so) loads via dlopen at startup; without it
          # the .NET host throws DllNotFoundException → exit 134 before
          # any ROM is loaded.
          sudo apt-get install -y build-essential clang cmake make git python3 zip xvfb libsdl2-2.0-0

      - name: Check out OpenSNES (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/opensnes-emu/package-lock.json

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50
          actions-cache-folder: emsdk-cache

      - name: Verify compiler toolchain pins
        run: python3 devtools/verify_toolchain.py

      - name: Build SDK (toolchain + lib + examples)
        run: |
          export OPENSNES_HOME=$(pwd)
          make

      - name: Cache opensnes-emu WASM core
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: tools/opensnes-emu/core/build
          key: wasm-core-${{ hashFiles('tools/opensnes-emu/core/bridge.cpp', 'tools/opensnes-emu/core/Makefile') }}

      - name: Build WASM core (snes9x libretro)
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        working-directory: tools/opensnes-emu/core
        run: make

      - name: Install opensnes-emu dependencies
        working-directory: tools/opensnes-emu
        run: npm ci

      - name: Install Mesen2 binary (chip-ROM coverage)
        # snes9x doesn't detect the GSU chip in OpenSNES SuperFX ROM
        # headers, so the snes9x-based visual phase only validates "boots
        # without crashing" for chip ROMs. The Mesen2 phase fills the gap.
        # The install script downloads ~15 MB once per CI run (no cache);
        # short-circuits if vendor/Mesen already matches the requested
        # version.
        working-directory: tools/opensnes-emu
        run: ./scripts/install-mesen2.sh

      - name: Bootstrap Mesen2 config (skip first-run wizard)
        # Mesen2's Program.Main shows an Avalonia setup wizard when no
        # settings.json exists, BEFORE checking the --testrunner flag.
        # On a headless CI runner that wizard hangs forever waiting for
        # input.
        #
        # A minimal `{"Version":"2.1.1","ConfigUpgrade":5}` config bypasses
        # the wizard but the C++ MesenCore.so then crashes in InitDll
        # with `std::bad_cast` because the per-system subsystem objects
        # (Snes, Nes, Gameboy, ...) it expects to dynamic_cast<> are
        # missing. Copy a fully-populated, sanitised settings.json
        # (paths and recents wiped) from the test fixtures so all
        # subsystem types are present and InitDll succeeds.
        run: |
          mkdir -p ~/.config/Mesen2
          cp tools/opensnes-emu/test/fixtures/mesen2-config/settings.json \
             ~/.config/Mesen2/settings.json

      - name: Run test suite
        working-directory: tools/opensnes-emu
        # Full suite (drops --quick so compiler tests run too).
        # --allow-known-bugs lets the 5 documented gaps (tail call optimisation,
        # A-cache through pha, stale leaf_opt marker) report as [KNOWN_BUG]
        # instead of failing — they are tracked as future compiler work, not
        # regressions. Real regressions still fail.
        run: node test/run-all-tests.mjs --allow-known-bugs

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: opensnes-emu test artifacts
          path: |
            tools/opensnes-emu/test/baselines/
            tools/opensnes-emu/roms/

