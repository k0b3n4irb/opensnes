name: Lint

# Mechanical enforcement of policies in .claude/rules/.
# Currently: commit-message format (Conventional Commits) and the no-AI-attribution
# rule. Add new lints to this workflow rather than to opensnes_build.yml so quick
# checks stay fast and don't get muddied with toolchain build time.

on:
  pull_request:
    branches:
      - "main"
      - "develop"
  push:
    branches:
      - "main"
      - "develop"

jobs:
  commit-messages:
    name: Commit messages (lint_commits.py)
    runs-on: ubuntu-latest
    steps:
      - name: Check out OpenSNES (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for the range walk

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            echo "range=${BASE}..${HEAD}" >> "$GITHUB_OUTPUT"
          else
            # On push, check commits in this push (before..after).
            # github.event.before may be all-zeros on a new branch, OR it may
            # point to a now-dangling commit after a force-push (the old tip
            # is no longer reachable from the new tip and was not fetched by
            # actions/checkout). In both cases, fall back to comparing against
            # origin/main, which catches everything that's newly landing on
            # this branch.
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
                 || [ -z "$BEFORE" ] \
                 || ! git rev-parse --verify --quiet "${BEFORE}^{commit}" >/dev/null; then
              echo "range=origin/main..HEAD" >> "$GITHUB_OUTPUT"
            else
              echo "range=${BEFORE}..HEAD" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run lint_commits.py
        run: python3 devtools/lint_commits.py "${{ steps.range.outputs.range }}"

  asm-markers:
    name: ASM .ACCU/.INDEX markers (lint_asm.py)
    runs-on: ubuntu-latest
    steps:
      - name: Check out OpenSNES
        uses: actions/checkout@v4

      - name: Run lint_asm.py
        # Hand-written ASM in lib/source and templates must declare the
        # post-rep/sep mode explicitly. WLA-DX's per-object-file mode
        # tracking loses precision at branch merges and silently emits
        # the wrong instruction width — caught historically as
        # `cpx #0` shipping as 2 bytes instead of 3, cascading
        # misalignment through the rest of the section.
        run: python3 devtools/lint_asm.py

  doc-drift:
    name: Doc drift (check_doc_drift.py)
    runs-on: ubuntu-latest
    steps:
      - name: Check out OpenSNES
        uses: actions/checkout@v4

      - name: Run check_doc_drift.py
        # Anchored claims that drift behind code: version macros in
        # lib/include/snes.h, ROADMAP "Current Status: post-vX.Y.Z" line,
        # "<N> examples" counts in active rule files, and ABI prototypes in
        # compiler/ABI.md vs lib/include/snes/*.h. Caught historically as
        # v0.1.0-dev macro stuck while the project shipped v0.16.0;
        # "post-v0.13.0" ROADMAP three minors behind; "53 examples" sticking
        # after v0.16.0 added the 54th; and the oamSet worked example pinning
        # a stale 6-arg signature. Fix policy lives in
        # .claude/rules/doc_consistency.md.
        run: python3 devtools/check_doc_drift.py

  nmi-race-tests:
    name: NMI/WRAM race lint regression tests (test_check_nmi_wram_race.py)
    runs-on: ubuntu-latest
    steps:
      - name: Check out OpenSNES
        uses: actions/checkout@v4

      - name: Run test_check_nmi_wram_race.py
        # Regression suite for devtools/check_nmi_wram_race.py — the
        # static lint that fails the build if any function reachable
        # from an NMI callback writes to $2180-$2183. The full lint
        # runs per-example via make/common.mk; its parser logic
        # (call-graph + callback-detection + closure) is exercised
        # here against synthetic fixtures so the rules can't silently
        # rot. Wired in chantier E1 (2026-05-09).
        run: python3 devtools/test_check_nmi_wram_race.py

  symmap-tests:
    name: symmap WRAM-overlap detector regression (test_symmap.py)
    runs-on: ubuntu-latest
    steps:
      - name: Check out OpenSNES
        uses: actions/checkout@v4

      - name: Run test_symmap.py
        # Regression suite for devtools/symmap/symmap.py --check-overlap, the
        # static analysis that catches bank $00 ↔ bank $7E WRAM-mirror
        # collisions. Pins its verdict against committed .sym fixtures (a
        # broken one must fail, a clean one must pass) so the detector can't
        # silently rot. Fixtures re-homed from the removed tools/debug-fixtures
        # (formerly consumed by the opensnes-emu runner).
        run: python3 devtools/symmap/test_symmap.py

  vram-layout:
    name: VRAM base alignment (check_vram_layout.py)
    runs-on: ubuntu-latest
    steps:
      - name: Check out OpenSNES
        uses: actions/checkout@v4

      - name: Run check_vram_layout.py
        # BG/sprite VRAM bases are programmed through registers that store only
        # the high address bits, so a misaligned base (e.g. bgSetGfxPtr(0,0x0800)
        # -> tiles silently read from 0x0000) is a silent failure with no error.
        # This scans every example .c, resolves literal / simple-#define VRAM
        # bases, and fails on a misaligned one (unresolvable args are skipped, so
        # it never false-fails). Also runs per-PR via `make lint`.
        run: python3 devtools/check_vram_layout.py

      - name: Run test_check_vram_layout.py
        working-directory: devtools
        run: python3 -m unittest test_check_vram_layout
