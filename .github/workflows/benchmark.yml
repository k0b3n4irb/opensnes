name: Benchmark

# Hard cycle-count regression gate (chantier E2, 2026-05-09).
# Compiles cc65816 at both PR HEAD and the PR base ref, runs
# `tools/opensnes-emu/test/run-benchmark.mjs` against each, posts the
# per-function delta as a PR comment, and FAILS the job when the delta
# breaches either threshold below.
#
# Thresholds (defined in devtools/cyclecount/cyclecount.py):
#   - Total cycles regression > 5%             → fail (broad-drift catch)
#   - Per-function: > 25% AND > 50 abs cycles  → fail (pathological catch)
#
# Override: include `Cycle-Regression-OK: <reason>` as a trailer in any
# commit message in the PR range. The job still posts the comparison
# comment but exits 0 instead of 1. The trailer lives in git history
# forever as the audit trail for the deliberate trade-off (typical
# uses: trading benchmark cycles for correctness, for code clarity,
# for compiler-stack maintainability).
#
# Originally shipped 2026-05-08 (commit 98d5014) in soft / comment-only
# form. Promoted to a hard gate 2026-05-09 once the gate had run on
# enough PRs to confirm its signal-to-noise ratio is workable.
#
# Why this is workable as a hard gate: the benchmark surface (34
# isolated functions in bench_functions.c) is narrow but the
# combined-threshold design above is tuned for that narrowness — the
# +50-cycle-absolute floor on per-function rules out small-routine
# noise, and the 5% total threshold smooths over individual swings.

# DISABLED 2026-06-20: this PR-vs-base gate ran the removed
# `opensnes-emu/test/run-benchmark.mjs`. The cycle-count benchmark itself is now
# re-homed in-repo (`devtools/cyclecount/bench.py` + `bench_functions.c`, run by
# `make bench` and the `functional-tests` CI job — static estimate vs a committed
# baseline). This workflow (which compiled at both PR HEAD and base to post a
# per-function delta comment) stays manual; rebuild it on `bench.py` if the PR
# delta comment is wanted, and add luna `--cpu-trace` ground-truth then (L5).
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # required to post / update the PR comment

jobs:
  benchmark:
    name: Compiler cycle-count benchmark (hard gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out PR HEAD with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history so we can checkout the base ref
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt-get install -y build-essential clang cmake make git python3 nodejs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capture refs
        id: refs
        run: |
          PR_HEAD=$(git rev-parse HEAD)
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          echo "pr_head=${PR_HEAD}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "PR HEAD: ${PR_HEAD}"
          echo "Base ref: ${BASE_REF}"

      # ─── PR HEAD build + benchmark ────────────────────────────────────────
      - name: Build compiler at PR HEAD
        run: make compiler

      - name: Run benchmark at PR HEAD
        id: bench-pr
        continue-on-error: true
        run: |
          node tools/opensnes-emu/test/run-benchmark.mjs > /tmp/bench_pr.log 2>&1 || true
          if [ -f /tmp/opensnes_bench_current.asm ]; then
            cp /tmp/opensnes_bench_current.asm /tmp/bench_pr.asm
            echo "captured=1" >> "$GITHUB_OUTPUT"
          else
            echo "captured=0" >> "$GITHUB_OUTPUT"
          fi

      # ─── Base ref build + benchmark ───────────────────────────────────────
      - name: Check out base branch
        run: |
          git fetch origin "${{ steps.refs.outputs.base_ref }}"
          git checkout "origin/${{ steps.refs.outputs.base_ref }}"
          git submodule update --init --recursive

      - name: Rebuild compiler at base
        run: |
          make -C compiler clean
          make compiler

      - name: Run benchmark at base
        id: bench-base
        continue-on-error: true
        run: |
          node tools/opensnes-emu/test/run-benchmark.mjs > /tmp/bench_base.log 2>&1 || true
          if [ -f /tmp/opensnes_bench_current.asm ]; then
            cp /tmp/opensnes_bench_current.asm /tmp/bench_base.asm
            echo "captured=1" >> "$GITHUB_OUTPUT"
          else
            echo "captured=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore PR HEAD
        run: |
          git checkout "${{ steps.refs.outputs.pr_head }}"
          git submodule update --init --recursive

      # ─── Compare + comment ────────────────────────────────────────────────
      #
      # Two-step gate:
      #   1. Run the comparison and capture its exit code (1 on
      #      threshold breach, 0 on clean).
      #   2. Check the PR commit range for the override trailer
      #      `Cycle-Regression-OK:`. If present, the job passes
      #      regardless of the comparison's exit code.
      #
      # Both steps continue-on-error so the comment-posting step always
      # runs; the final "Enforce gate" step is what fails the job.
      - name: Compare cycle counts
        id: compare
        continue-on-error: true
        run: |
          if [ "${{ steps.bench-pr.outputs.captured }}" != "1" ] \
              || [ "${{ steps.bench-base.outputs.captured }}" != "1" ]; then
            echo "One or both benchmarks failed to produce output." \
                 > /tmp/bench_compare.txt
            echo "captured=0" >> "$GITHUB_OUTPUT"
            echo "regression=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "captured=1" >> "$GITHUB_OUTPUT"
          if python3 devtools/cyclecount/cyclecount.py \
              --compare /tmp/bench_base.asm /tmp/bench_pr.asm \
              --fail-on-regression \
              > /tmp/bench_compare.txt 2>&1; then
            echo "regression=0" >> "$GITHUB_OUTPUT"
          else
            echo "regression=1" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/bench_compare.txt

      - name: Check for override trailer
        id: override
        continue-on-error: true
        run: |
          BASE="origin/${{ steps.refs.outputs.base_ref }}"
          HEAD="${{ steps.refs.outputs.pr_head }}"
          # Make sure the base ref is local (we already checked it out earlier
          # but the restore-PR-HEAD step put us back; the base ref should still
          # be in the local repo as origin/<branch>).
          if git log "${BASE}..${HEAD}" --format=%B 2>/dev/null \
               | grep -qE '^Cycle-Regression-OK:'; then
            echo "present=1" >> "$GITHUB_OUTPUT"
            echo "Override trailer found — gate will pass regardless of regression."
          else
            echo "present=0" >> "$GITHUB_OUTPUT"
            echo "No override trailer in commit messages."
          fi

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- opensnes-benchmark-comment -->';
            const regression = '${{ steps.compare.outputs.regression }}' === '1';
            const override   = '${{ steps.override.outputs.present }}'  === '1';

            let header;
            if (!regression) {
              header = '## Compiler benchmark (hard gate — clean)';
            } else if (override) {
              header = '## Compiler benchmark (hard gate — regression overridden)';
            } else {
              header = '## Compiler benchmark (hard gate — REGRESSION, blocking)';
            }

            let body = MARKER + '\n' + header + '\n\n';

            try {
              const compare = fs.readFileSync('/tmp/bench_compare.txt', 'utf-8').trim();
              body += '```\n' + compare + '\n```\n\n';
            } catch (e) {
              body += `_Benchmark output unavailable: ${e.message}_\n\n`;
            }

            if (regression && override) {
              body += '✅ The override trailer `Cycle-Regression-OK: <reason>` ' +
                      'is present in this PR\'s commits, so the gate passes. ' +
                      'The regression is recorded above for reviewer awareness.\n\n';
            } else if (regression) {
              body += '❌ Regression detected and **no override trailer** found in ' +
                      'this PR\'s commit messages. The job fails. To merge a ' +
                      'deliberate regression, add a `Cycle-Regression-OK: <reason>` ' +
                      'trailer to one of the PR\'s commit messages and push again.\n\n';
            }

            body += '_Compares cc65816 cycle output for ' +
                    '`tools/opensnes-emu/test/fixtures/benchmark/bench_functions.c` ' +
                    'between PR HEAD and `${{ steps.refs.outputs.base_ref }}`. ' +
                    'Hard gate — see `.github/workflows/benchmark.yml` and ' +
                    '`docs/BENCHMARK.md` for thresholds and override mechanism._';

            // Find existing benchmark comment for idempotency
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(
              c => c.body && c.body.includes(MARKER)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new comment');
            }

      - name: Enforce gate
        run: |
          REGRESSION="${{ steps.compare.outputs.regression }}"
          OVERRIDE="${{ steps.override.outputs.present }}"
          if [ "$REGRESSION" = "1" ] && [ "$OVERRIDE" != "1" ]; then
            echo "::error::Cycle-count regression detected and no override trailer present."
            echo "Add a 'Cycle-Regression-OK: <reason>' trailer to a commit in this PR's range to override."
            exit 1
          fi
          echo "Gate passes (regression=$REGRESSION, override=$OVERRIDE)."
