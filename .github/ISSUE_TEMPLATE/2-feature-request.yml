name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's missing?
      placeholder: "I need to display more than 128 sprites but the SNES hardware limit..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work? API sketch, behavior description, etc.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Library (new function / module)
        - Compiler optimization
        - Tools (gfx4snes, smconv, font2snes)
        - New example
        - Documentation
        - Build system / CI
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've tried or thought about.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: References, links to other SNES SDKs, screenshots.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I checked the roadmap and existing issues
          required: true
