name: Bug Report
description: Report a bug in the compiler, library, tools, or examples
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the fields below.
        The more detail you provide, the faster we can fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? Be specific.
      placeholder: "When I build the breakout example, the ball passes through the paddle on the left side."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to trigger the bug. A minimal main.c is ideal.
      placeholder: |
        1. cd examples/games/breakout
        2. make clean && make
        3. Open breakout.sfc in Mesen2
        4. Move paddle to the left edge
        5. Observe ball passing through
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happens instead? Include screenshots or short video if possible.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the SDK is affected?
      options:
        - Compiler (cc65816, cproc, QBE)
        - Library (lib/)
        - Runtime (crt0.asm, runtime.asm)
        - Tools (gfx4snes, smconv, font2snes)
        - Examples
        - Build system (Makefile, CI)
        - Documentation
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenSNES Version
      description: Commit hash or release tag
      placeholder: "v0.8.1 or commit abc1234"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, emulator
      placeholder: "Linux x86_64, Mesen2 0.5.0"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, .sym file excerpts, generated .asm, or attach the .sfc ROM.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I tested with the latest develop branch
          required: false
